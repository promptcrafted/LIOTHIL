# =============================================================================
# Test 5: High-Noise Expert Isolation (TRAIN-02)
# =============================================================================
# Trains ONLY the high-noise expert in true isolation:
#   - No unified warm-up phase (unified_epochs: 0)
#   - No low-noise phase (low_noise.enabled: false)
#   - Single phase: HIGH_NOISE, 5 epochs
#
# Validates TRAIN-02: high-noise-only training completes without crash,
# saves loadable checkpoints, and shows decreasing loss.
#
# Mirror of test4-low-only.yaml with enabled flags flipped.
# Flat lr 5e-5 everywhere -- no per-expert learning rate overrides.
# Samples generated every epoch for maximum visibility into convergence.

# -- Model ---------------------------------------------------------------
model:
  variant: 2.2_t2v
  dit_high: /workspace/models/wan2.2_t2v_high_noise_14B_fp16.safetensors
  dit_low: /workspace/models/wan2.2_t2v_low_noise_14B_fp16.safetensors
  vae: /workspace/models/wan_2.1_vae.safetensors
  t5: /workspace/models/models_t5_umt5-xxl-enc-bf16.pth

data_config: /workspace/datasets/test/dimljus_data.yaml

cache:
  cache_dir: /workspace/dimljus/cache

# -- LoRA ----------------------------------------------------------------
lora:
  rank: 16
  alpha: 16

# -- Optimizer -----------------------------------------------------------
optimizer:
  type: adamw8bit                       # 8-bit AdamW for VRAM efficiency on 14B
  learning_rate: 5e-5                   # Flat lr -- no per-expert override

# -- Training ------------------------------------------------------------
training:
  mixed_precision: bf16
  gradient_checkpointing: true
  seed: 42
  unified_epochs: 0                     # KEY: no unified phase
  batch_size: 1

# -- MoE -----------------------------------------------------------------
moe:
  enabled: true
  fork_enabled: true

  high_noise:
    enabled: true                       # ONLY this expert trains
    max_epochs: 5

  low_noise:
    enabled: false                      # KEY: disable low-noise expert
    max_epochs: 5                       # Still needed for Pydantic validation

# -- Save ----------------------------------------------------------------
save:
  save_every_n_epochs: 1
  output_dir: /workspace/outputs/test5-high-only
  name: test_lora

# -- Logging -------------------------------------------------------------
logging:
  backends: [console, wandb]
  log_every_n_steps: 1
  wandb_project: dimljus-isolation
  wandb_run_name: high-only-r16-lr5e-05

# -- Sampling ------------------------------------------------------------
sampling:
  enabled: true
  every_n_epochs: 1                     # Sample every epoch for max visibility
  prompts:
    - "Medium shot, Holly Golightly walks up an indoor staircase, looking back over her shoulder, morning light."
  neg: "blurry, low quality, distorted"
  seed: 42
  sample_steps: 30
  guidance_scale: 4.0
