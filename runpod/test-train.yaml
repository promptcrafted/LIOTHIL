# =============================================================================
# Test Training Config — RunPod Validation
# =============================================================================
# Minimal config for verifying the pipeline works end-to-end.
# Upload a small dataset (5-10 clips + .txt captions) to:
#   /workspace/datasets/test/
#
# Usage:
#   # Dry run (validate only, no GPU)
#   python /workspace/dimljus/runpod/train.py --config /workspace/dimljus/runpod/test-train.yaml --dry-run
#
#   # Full run
#   python /workspace/dimljus/runpod/train.py --config /workspace/dimljus/runpod/test-train.yaml


# ── Model ───────────────────────────────────────────────────────────
model:
  variant: 2.2_t2v

  # Individual weight files (downloaded by setup.sh)
  dit_high: /workspace/models/wan2.2_t2v_high_noise_14B_fp16.safetensors
  dit_low: /workspace/models/wan2.2_t2v_low_noise_14B_fp16.safetensors
  vae: /workspace/models/wan_2.1_vae.safetensors
  t5: /workspace/models/models_t5_umt5-xxl-enc-bf16.pth

data_config: /workspace/datasets/test/dimljus_data.yaml

# ── Cache ─────────────────────────────────────────────────────────
cache:
  cache_dir: /workspace/dimljus/cache


# ── LoRA ────────────────────────────────────────────────────────────
lora:
  rank: 16
  alpha: 16


# ── Optimizer ───────────────────────────────────────────────────────
optimizer:
  type: adamw8bit
  learning_rate: 5e-5


# ── Training ────────────────────────────────────────────────────────
training:
  mixed_precision: bf16
  gradient_checkpointing: true
  seed: 42
  unified_epochs: 3                    # Short — just testing the pipeline
  batch_size: 1


# ── MoE ─────────────────────────────────────────────────────────────
moe:
  enabled: true
  fork_enabled: true

  high_noise:
    learning_rate: 1e-4
    max_epochs: 3                      # Short for testing

  low_noise:
    learning_rate: 8e-5
    max_epochs: 3                      # Short for testing


# ── Save ────────────────────────────────────────────────────────────
save:
  save_every_n_epochs: 1
  output_dir: /workspace/outputs/test-run
  name: test_lora


# ── Logging ─────────────────────────────────────────────────────────
logging:
  backends: [console]
  log_every_n_steps: 1


# ── Sampling ────────────────────────────────────────────────────────
sampling:
  enabled: true
  every_n_epochs: 3               # Sample at the end of each phase (3 epochs)
  prompts:
    - "A woman with dark hair styled in an updo walks down a city street, wearing a black dress and pearls, morning light."
  neg: "blurry, low quality, distorted"
  seed: 42
  sample_steps: 20                # Fewer steps for faster test sampling
  guidance_scale: 5.0
