# =============================================================================
# Musubi-Tuner Dataset Config — RunPod Template
# =============================================================================
# Edit this file to point to YOUR dataset directory on RunPod.
#
# Dataset structure on RunPod:
#   /workspace/datasets/my_dataset/
#       Videos/           ← training video clips (.mp4)
#       Videos/*.txt      ← caption sidecar files (same stem as video)
#       Images/           ← reference images for I2V (.png, .jpg)
#
# Upload your dataset via Jupyter Lab (click the link in RunPod dashboard).
# =============================================================================

# --- Resolution ---
# 832x480 = standard 480p (lower VRAM, faster training)
# 1280x720 = 720p (higher quality, needs more VRAM)
# Format: [width, height]

[[datasets]]
resolution = [832, 480]
caption_extension = ".txt"
batch_size = 1
enable_bucket = true
cache_latents = true

  [[datasets.subsets]]
  # EDIT THIS: Point to your video clips directory
  video_directory = "/workspace/datasets/my_dataset/Videos"
  num_repeats = 1

  # --- Uncomment for I2V training (reference images) ---
  # [[datasets.subsets]]
  # image_directory = "/workspace/datasets/my_dataset/Images"
  # num_repeats = 1
